<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Product preview card component</title>
</head>

<body>
    <main class="card">
        <section>
            <picture>
                <source media="(min-width: 600px)" srcset="assets/image-product-desktop.jpg">

                <img src="assets/image-product-mobile.jpg" alt="perfume Gabrielle Essence CHANEL" class="image-perfume">
            </picture>
        </section>
        <section class="product-detail">
            <span class="perfume">PERFUME</span>
            <h1>Gabrielle Essence Eau De Parfum</h1>
            <p> A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House
                of CHANEL.</p>
            <div class="price">
                <span class="new-price"> $149.99</span>
                <del>$169.99</del>
            </div>
            <button class="cart-btn "><img src="assets/icon-cart.svg" alt="icon-cart">Add to Cart</button>
        </section>
    </main>
    <footer class="attribution">
        Challenge by <a
            href="https://www.frontendmentor.io/learning-paths/building-responsive-layouts--z1qCXVqkD/challenge/65e71e1c17e502f0b6ce64b0/start"
            target="_blank" rel="noopener noreferrer">Frontend Mentor</a>
        Coded by <a href="https://www.frontendmentor.io/profile/Jolitacode" target="_blank"
            rel="noopener noreferrer">Audrey</a>
    </footer>
</body>

</html>
